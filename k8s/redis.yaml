apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: obito-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obito-store-secrets
                  key: REDIS_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: obito-store
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
