apiVersion: apps/v1
kind: Deployment
metadata:
  name: obito-store-backend-blue
  namespace: obito-store
  labels:
    app: obito-store-backend
    color: blue
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: obito-store-backend
      color: blue
  template:
    metadata:
      labels:
        app: obito-store-backend
        color: blue
    spec:
      containers:
        - name: backend
          image: ghcr.io/yourorg/library-devops-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: obito-store-secrets
          env:
            - name: DB_HOST
              value: postgres
            - name: REDIS_HOST
              value: redis
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: obito-store
spec:
  selector:
    app: obito-store-backend
    color: blue
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
  type: ClusterIP
