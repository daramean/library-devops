apiVersion: v1
kind: ConfigMap
metadata:
  name: obito-store-nginx-config
  namespace: obito-store
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile        on;
      tcp_nopush      on;
      tcp_nodelay     on;
      keepalive_timeout 65;

      upstream backend {
        server backend:5000;
        keepalive 32;
      }

      upstream frontend {
        server frontend:3000;
      }

      server {
        listen 80;
        server_name localhost;

        location /api/ {
          proxy_pass http://backend;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_cache_bypass $http_upgrade;
          proxy_read_timeout 90;
        }

        location /api/auth/ {
          proxy_pass http://backend;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
          proxy_pass http://frontend;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obito-store-nginx
  namespace: obito-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obito-store-nginx
  template:
    metadata:
      labels:
        app: obito-store-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-config
          configMap:
            name: obito-store-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: obito-store
spec:
  selector:
    app: obito-store-nginx
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: LoadBalancer
