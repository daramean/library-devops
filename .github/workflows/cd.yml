name: CD

on:
  push:
    branches: ["develop", "main"]

env:
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: library_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d library_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: library_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_jwt_secret
      JWT_REFRESH_SECRET: dev_jwt_refresh_secret
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run unit tests
        run: cd backend && npm test

      - name: Run linter
        run: cd backend && npm run lint

  build_and_push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-tag: ${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/library-devops-backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/library-devops-backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/library-devops-frontend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/library-devops-frontend:latest

  deploy-dev:
    name: Deploy to Kubernetes (Dev)
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA_DEV }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|library-devops-backend:latest|${{ env.REGISTRY }}/${{ github.repository_owner }}/library-devops-backend:${{ needs.build_and_push.outputs.image-tag }}|g" k8s/backend.yaml
          sed -i "s|library-devops-frontend:latest|${{ env.REGISTRY }}/${{ github.repository_owner }}/library-devops-frontend:${{ needs.build_and_push.outputs.image-tag }}|g" k8s/frontend.yaml

      - name: Apply namespace and secrets
        run: |
          kubectl create namespace obito-store --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/secret.yaml

      - name: Deploy to dev with rolling update strategy
        run: |
          echo "Deploying to dev environment with rolling update strategy..."
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/nginx.yaml
          
          # Wait for rollout
          kubectl rollout status deployment/obito-store-backend-blue -n obito-store --timeout=5m
          kubectl rollout status deployment/obito-store-frontend -n obito-store --timeout=5m

      - name: Verify deployment
        run: |
          echo "Dev deployment status:"
          kubectl get pods -n obito-store
          kubectl get services -n obito-store

  deploy-prod:
    name: Deploy to Kubernetes (Prod)
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl for production
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|library-devops-backend:latest|${{ env.REGISTRY }}/${{ github.repository_owner }}/library-devops-backend:${{ needs.build_and_push.outputs.image-tag }}|g" k8s/backend.yaml
          sed -i "s|library-devops-frontend:latest|${{ env.REGISTRY }}/${{ github.repository_owner }}/library-devops-frontend:${{ needs.build_and_push.outputs.image-tag }}|g" k8s/frontend.yaml

      - name: Apply namespace and secrets
        run: |
          kubectl create namespace obito-store --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/secret.yaml

      - name: Deploy to production with rolling update strategy
        run: |
          echo "Deploying to production environment with rolling update strategy..."
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/nginx.yaml
          
          # Wait for rollout to complete before considering deployment successful
          kubectl rollout status deployment/obito-store-backend-blue -n obito-store --timeout=5m
          kubectl rollout status deployment/obito-store-frontend -n obito-store --timeout=5m

      - name: Verify production deployment
        run: |
          echo "Production deployment status:"
          kubectl get pods -n obito-store
          kubectl get services -n obito-store
