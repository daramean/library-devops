name: CD

on:
  push:
    branches: ["develop", "main"]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build_and_push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-tag: ${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: docker/Dockerfile.backend
          push: false
          tags: |
            library-devops-backend:${{ env.IMAGE_TAG }}
            library-devops-backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: docker/Dockerfile.frontend
          push: false
          tags: |
            library-devops-frontend:${{ env.IMAGE_TAG }}
            library-devops-frontend:latest

  deploy:
    name: Deploy to Kubernetes (dev)
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Deploy to dev
        run: |
          echo "Build and push completed successfully!"
          echo "Images pushed to GHCR:"
          echo "  - ghcr.io/${{ github.repository_owner }}/library-devops-backend:${{ needs.build_and_push.outputs.image-tag }}"
          echo "  - ghcr.io/${{ github.repository_owner }}/library-devops-frontend:${{ needs.build_and_push.outputs.image-tag }}"
          echo ""
          echo "To deploy to Kubernetes, configure KUBE_CONFIG_DATA_DEV secret in GitHub"

  deploy-prod:
    name: Deploy to Kubernetes (prod)
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        run: |
          echo "Build and push completed successfully!"
          echo "Images pushed to GHCR:"
          echo "  - ghcr.io/${{ github.repository_owner }}/library-devops-backend:${{ needs.build_and_push.outputs.image-tag }}"
          echo "  - ghcr.io/${{ github.repository_owner }}/library-devops-frontend:${{ needs.build_and_push.outputs.image-tag }}"
          echo ""
          echo "To deploy to Kubernetes, configure KUBE_CONFIG_DATA_PROD secret in GitHub"
