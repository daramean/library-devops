name: CD

on:
  push:
    branches: ["develop", "main"]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build_and_push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ env.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/library-devops-backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/library-devops-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/library-devops-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/library-devops-frontend:latest

  deploy:
    name: Deploy to Kubernetes (dev)
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig for develop (dev cluster)
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA_DEV }}" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Apply kustomize (ensure resources exist)
        run: |
          kubectl apply -k k8s

      - name: Update backend image
        run: |
          kubectl -n obito-store set image deployment/obito-store-backend-blue backend=ghcr.io/${{ github.repository_owner }}/library-devops-backend:${{ needs.build_and_push.outputs.image-tag }} --record
          kubectl -n obito-store rollout status deployment/obito-store-backend-blue --timeout=120s

      - name: Update frontend image
        run: |
          kubectl -n obito-store set image deployment/obito-store-frontend-blue frontend=ghcr.io/${{ github.repository_owner }}/library-devops-frontend:${{ needs.build_and_push.outputs.image-tag }} --record
          kubectl -n obito-store rollout status deployment/obito-store-frontend-blue --timeout=120s

  deploy-prod:
    name: Deploy to Kubernetes (prod)
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig for main (prod cluster)
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA_PROD }}" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Apply kustomize
        run: kubectl apply -k k8s

      - name: Deploy production backend blue/green
        run: |
          set -euo pipefail
          ACTIVE_COLOR=$(kubectl -n obito-store get service backend -o jsonpath='{.spec.selector.color}')
          if [ "$ACTIVE_COLOR" = "blue" ]; then
            NEXT_COLOR=green
          else
            NEXT_COLOR=blue
          fi
          echo "Active backend color=$ACTIVE_COLOR, deploying next=$NEXT_COLOR"
          kubectl -n obito-store set image deployment/obito-store-backend-${NEXT_COLOR} backend=ghcr.io/${{ github.repository_owner }}/library-devops-backend:${{ needs.build_and_push.outputs.image-tag }} --record
          kubectl -n obito-store rollout status deployment/obito-store-backend-${NEXT_COLOR} --timeout=180s
          kubectl -n obito-store patch service backend -p '{"spec":{"selector":{"app":"obito-store-backend","color":"'${NEXT_COLOR}'"}}}'

      - name: Deploy production frontend blue/green
        run: |
          set -euo pipefail
          ACTIVE_COLOR=$(kubectl -n obito-store get service frontend -o jsonpath='{.spec.selector.color}')
          if [ "$ACTIVE_COLOR" = "blue" ]; then
            NEXT_COLOR=green
          else
            NEXT_COLOR=blue
          fi
          echo "Active frontend color=$ACTIVE_COLOR, deploying next=$NEXT_COLOR"
          kubectl -n obito-store set image deployment/obito-store-frontend-${NEXT_COLOR} frontend=ghcr.io/${{ github.repository_owner }}/library-devops-frontend:${{ needs.build_and_push.outputs.image-tag }} --record
          kubectl -n obito-store rollout status deployment/obito-store-frontend-${NEXT_COLOR} --timeout=180s
          kubectl -n obito-store patch service frontend -p '{"spec":{"selector":{"app":"obito-store-frontend","color":"'${NEXT_COLOR}'"}}}'
